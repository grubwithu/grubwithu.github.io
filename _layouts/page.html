---
layout: default
---

<article class="page-content">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  
  <div class="page-body">
    {{ content }}
  </div>
</article>

<style>
.page-content {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

.page-header {
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 2px solid #e9ecef;
}

.page-header h1 {
  font-size: 2.2rem;
  color: #2c3e50;
  margin-bottom: 10px;
}

.page-subtitle {
  font-size: 1.2rem;
  color: #6c757d;
  font-style: italic;
}

.page-body {
  line-height: 1.8;
}

.page-body h2 {
  font-size: 1.6rem;
  margin-top: 40px;
  margin-bottom: 20px;
  color: #2c3e50;
}

.page-body h3 {
  font-size: 1.3rem;
  margin-top: 30px;
  margin-bottom: 15px;
  color: #2c3e50;
}

.page-body ul, .page-body ol {
  padding-left: 30px;
  margin-bottom: 20px;
}

.page-body li {
  margin-bottom: 8px;
}

.page-body code {
  background-color: #f8f9fa;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Source Code Pro', monospace;
  font-size: 0.9em;
}

.page-body pre {
  background-color: #f8f9fa;
  padding: 15px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 20px 0;
  border-left: 4px solid #3498db;
}

@media (max-width: 768px) {
  .page-content {
    padding: 10px;
  }
  
  .page-header h1 {
    font-size: 1.8rem;
  }
}
</style>
