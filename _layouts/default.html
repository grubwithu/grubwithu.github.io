<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Code+Pro:wght@300;400&display=swap" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <!-- Favicon -->
  <link rel="icon" href="{{ '/avatar.jpg' | relative_url }}" type="image/jpeg">
  
  <!-- SEO -->
  <meta name="description" content="{{ site.description }}">
  <meta name="keywords" content="cybersecurity, robotic security, kernel security, Qiming Guo, Beihang University, NKLSTISS">
  <meta name="author" content="{{ site.author.name }}">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{{ '/avatar.jpg' | absolute_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </h1>
      <p class="site-subtitle">{{ site.description }}</p>
      
      <nav class="site-nav">
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/publications' | relative_url }}">Publications</a></li>
          <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
          <li><a href="{{ '/awards' | relative_url }}">Awards</a></li>
          <li><a href="{{ '/education' | relative_url }}">Education</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="mailto:{{ site.author.email }}"><i class="fas fa-envelope"></i> Email</a>
        <a href="https://github.com/{{ site.author.github }}"><i class="fab fa-github"></i> GitHub</a>
        <a href="{{ '/' | relative_url }}"><i class="fas fa-home"></i> Home</a>
      </div>
      <p class="footer-copyright">
        &copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. All rights reserved.<br>
        Last updated: {{ site.time | date: '%B %d, %Y' }}
      </p>
    </div>
  </footer>

  <script>
    // Smooth scrolling for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // Add active class to current page in navigation
    const currentPage = window.location.pathname;
    document.querySelectorAll('.site-nav a').forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
